<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="seo-title">Photographe</title>
  <meta name="description" id="seo-desc" content="">
  <meta property="og:image" id="seo-og" content="">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400;1,8..60,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent-h: 38;
      --accent-s: 28%;
      --accent-l: 55%;
      --accent: hsl(var(--accent-h), var(--accent-s), var(--accent-l));
      --accent-soft: hsl(var(--accent-h), var(--accent-s), 75%);
      --accent-dim: hsl(var(--accent-h), 15%, 30%);

      --bg: #0b0a09;
      --bg-elevated: #141311;
      --bg-surface: #1a1917;
      --text: #edebe8;
      --text-sub: #8a847b;
      --text-dim: #5a5549;
      --border: #252320;
      --border-light: #1e1d1a;

      --font-sans: 'Outfit', system-ui, sans-serif;
      --font-serif: 'Source Serif 4', Georgia, serif;

      --max-w: 1440px;
      --nav-h: 76px;
      --radius: 14px;
      --radius-sm: 8px;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    :root:not(.dark) {
      --bg: #f8f6f3;
      --bg-elevated: #ffffff;
      --bg-surface: #efece8;
      --text: #1a1816;
      --text-sub: #7a746b;
      --text-dim: #b5ae a4;
      --border: #e2ddd6;
      --border-light: #ebe7e1;
      --accent-l: 42%;
      --accent-dim: hsl(var(--accent-h), 15%, 75%);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
    }

    .serif { font-family: var(--font-serif); font-style: italic; font-weight: 400; color: var(--accent); }
    .container { max-width: var(--max-w); margin: 0 auto; padding: 0 clamp(1.25rem, 4vw, 3rem); }
    .section { padding: clamp(3.5rem, 8vw, 6rem) 0; }

    h1 {
      font-size: clamp(2.4rem, 5.5vw, 4.5rem);
      font-weight: 300;
      letter-spacing: -0.04em;
      line-height: 1.05;
    }

    h2 {
      font-size: clamp(1.8rem, 4vw, 3.2rem);
      font-weight: 300;
      letter-spacing: -0.03em;
      line-height: 1.1;
    }

    h3 {
      font-size: 1.15rem;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    p { color: var(--text-sub); line-height: 1.75; max-width: 60ch; }

    /* ─── REVEAL ──────────────────────────────────────── */
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 1s var(--ease), transform 1s var(--ease);
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .r1 { transition-delay: 0.08s; }
    .r2 { transition-delay: 0.16s; }
    .r3 { transition-delay: 0.24s; }
    .r4 { transition-delay: 0.32s; }
    .r5 { transition-delay: 0.40s; }

    /* ─── BUTTONS ─────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 15px 36px;
      border-radius: 100px;
      font-family: var(--font-sans);
      font-weight: 400;
      font-size: 0.9rem;
      letter-spacing: 0.02em;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: all 0.5s var(--ease);
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--text);
      color: var(--bg);
    }

    .btn-primary:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }

    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-outline:hover { border-color: var(--text-sub); }

    .label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--border);
    }

    /* ─── NAV ─────────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--nav-h);
      z-index: 100;
      transition: all 0.5s var(--ease);
    }

    nav.scrolled {
      background: color-mix(in srgb, var(--bg) 90%, transparent);
      backdrop-filter: blur(24px) saturate(1.6);
      -webkit-backdrop-filter: blur(24px) saturate(1.6);
      border-bottom: 1px solid var(--border-light);
    }

    .nav-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 clamp(1.25rem, 4vw, 3rem);
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      font-weight: 300;
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
    }

    .nav-logo img {
      height: clamp(40px, 5vw, 56px);
      max-width: 200px;
      width: auto;
      object-fit: contain;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 36px;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.82rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: rgba(237,235,232,0.75);
      text-decoration: none;
      transition: color 0.4s var(--ease);
    }

    .nav-links a:hover { color: #edebe8; }

    .nav-cta {
      padding: 10px 26px !important;
      background: var(--accent) !important;
      color: #fff !important;
      border: none !important;
      border-radius: 100px !important;
      font-weight: 500 !important;
      transition: all 0.4s var(--ease) !important;
    }

    .nav-cta:hover { opacity: 0.85 !important; }

    .nav-burger {
      display: none;
      flex-direction: column;
      gap: 6px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 8px;
    }

    .nav-burger span {
      width: 24px;
      height: 1.5px;
      background: var(--text);
      transition: all 0.3s var(--ease);
    }

    .mobile-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 150;
      background: var(--bg);
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 0 clamp(2rem, 8vw, 6rem);
      gap: 24px;
    }

    .mobile-overlay.open { display: flex; }

    .mobile-overlay a {
      font-family: var(--font-sans);
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 300;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
      transition: color 0.3s;
    }

    .mobile-overlay a:hover { color: var(--text-sub); }

    #mobile-links {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .mobile-overlay .mobile-close {
      position: absolute;
      top: 20px;
      right: 24px;
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 151;
      -webkit-tap-highlight-color: transparent;
    }

    /* ─── HERO ────────────────────────────────────────── */
    .hero {
      position: relative;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
    }

    .hero-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(0.7) contrast(1.1) brightness(0.45);
      transform: scale(1.05);
      transition: transform 12s var(--ease);
    }

    .hero.loaded .hero-bg img { transform: scale(1); }

    .hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to top, var(--bg) 0%, rgba(11,10,9,0.2) 50%, transparent 80%),
        linear-gradient(to right, rgba(11,10,9,0.65) 0%, rgba(11,10,9,0.2) 55%, transparent 80%);
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 clamp(2rem, 5vw, 4rem);
      padding-top: calc(var(--nav-h) + clamp(1rem, 3vh, 2.5rem));
      padding-bottom: clamp(1.5rem, 3vh, 2.5rem);
      display: flex;
      flex-direction: column;
      gap: clamp(12px, 1.8vh, 18px);
    }

    .hero-content h1 { color: #edebe8; max-width: 10ch; }
    .hero-content h1 .serif { font-weight: 400; }
    .hero-content > p { color: rgba(237,235,232,0.6); font-size: 1.05rem; max-width: 42ch; }

    .hero-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
    .hero-buttons .btn-primary { background: #edebe8; color: #0b0a09; }
    .hero-buttons .btn-primary:hover { background: #fff; }
    .hero-buttons .btn-outline { border-color: rgba(237,235,232,0.2); color: #edebe8; }
    .hero-buttons .btn-outline:hover { border-color: rgba(237,235,232,0.5); }

    /* ─── HERO PROOF ──────────────────────────────────── */
    .hero-proof {
      display: flex;
      align-items: center;
      gap: 28px;
      flex-wrap: wrap;
      padding-top: 4px;
    }

    .proof-google {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: background 0.3s;
    }

    .proof-google:hover { background: rgba(255,255,255,0.1); }

    .proof-google-icon { width: 18px; height: 18px; flex-shrink: 0; }

    .proof-score {
      font-weight: 600;
      font-size: 0.95rem;
      color: #edebe8;
    }

    .proof-stars { display: flex; gap: 1px; }

    .proof-star { width: 13px; height: 13px; }
    .proof-star svg { width: 100%; height: 100%; fill: #f59e0b; }

    .proof-count {
      font-size: 0.72rem;
      color: rgba(237,235,232,0.45);
    }

    .proof-sep {
      width: 1px;
      height: 32px;
      background: rgba(237,235,232,0.12);
    }

    .proof-stat-value {
      font-weight: 600;
      font-size: 1.15rem;
      color: #edebe8;
      display: block;
    }

    .proof-stat-label {
      font-size: 0.72rem;
      color: rgba(237,235,232,0.4);
      display: block;
    }

    /* ─── PARTNERS ────────────────────────────────────── */
    .partners {
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 24px 0;
      overflow: hidden;
    }

    .partners-label {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-align: center;
      margin-bottom: 18px;
    }

    .partners-track {
      display: flex;
      width: max-content;
      min-width: 200%;
      animation: scroll-x 30s linear infinite;
      will-change: transform;
      -webkit-animation: scroll-x 30s linear infinite;
    }

    .partners-track:hover { animation-play-state: paused; }

    .partner-name {
      flex-shrink: 0;
      padding: 0 clamp(20px, 3.5vw, 44px);
      font-weight: 400;
      font-size: clamp(0.8rem, 1.1vw, 0.95rem);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-dim);
      white-space: nowrap;
      transition: color 0.3s;
      cursor: default;
    }

    .partner-name:hover { color: var(--text-sub); }

    .partner-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
      align-self: center;
    }

    @-webkit-keyframes scroll-x {
      0% { -webkit-transform: translateX(0); transform: translateX(0); }
      100% { -webkit-transform: translateX(-50%); transform: translateX(-50%); }
    }

    @keyframes scroll-x {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* ─── ABOUT ───────────────────────────────────────── */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1.3fr;
      gap: clamp(2.5rem, 6vw, 6rem);
      align-items: center;
    }

    .about-img-wrap {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      aspect-ratio: 3/4;
    }

    .about-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(0.8) contrast(1.05);
      transition: transform 8s var(--ease);
    }

    .about-img-wrap:hover img { transform: scale(1.04); }

    .about-right { display: flex; flex-direction: column; gap: 24px; }

    .about-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 16px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .stat-val {
      font-size: 1.8rem;
      font-weight: 300;
      letter-spacing: -0.03em;
      color: var(--accent);
    }

    .stat-label {
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* ─── SERVICES (zig-zag) ──────────────────────────── */
    .services-head {
      margin-bottom: clamp(3rem, 6vw, 5rem);
      max-width: 520px;
    }

    .services-head p { margin-top: 16px; }

    .service-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      margin-bottom: 2px;
    }

    .service-row:nth-child(even) .service-img { order: -1; }

    .service-text {
      background: var(--bg-elevated);
      padding: clamp(2rem, 4vw, 3.5rem);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 14px;
    }

    .service-text h3 { font-weight: 400; font-size: 1.35rem; letter-spacing: -0.02em; }
    .service-text p { font-size: 0.95rem; }

    .service-price {
      font-weight: 500;
      font-size: 0.95rem;
      color: var(--accent);
      margin-top: 4px;
    }

    .service-img {
      position: relative;
      overflow: hidden;
      min-height: 300px;
    }

    .service-img img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(0.8) contrast(1.05);
      transition: transform 1s var(--ease);
    }

    .service-row:hover .service-img img { transform: scale(1.05); }

    /* ─── PORTFOLIO (horizontal scroll) ───────────────── */
    .portfolio-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: clamp(1.5rem, 3vw, 2.5rem);
    }

    .portfolio-filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .pf-btn {
      padding: 8px 20px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: transparent;
      font-family: var(--font-sans);
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: var(--text-sub);
      cursor: pointer;
      transition: all 0.3s var(--ease);
    }

    .pf-btn:hover { border-color: var(--text-dim); }

    .pf-btn.active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    .gallery-scroll {
      display: flex;
      gap: 14px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-padding: clamp(1.25rem, 4vw, 3rem);
      padding-bottom: 20px;
      -ms-overflow-style: none;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .gallery-scroll::-webkit-scrollbar { height: 4px; }
    .gallery-scroll::-webkit-scrollbar-track { background: transparent; }
    .gallery-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .gallery-item {
      flex-shrink: 0;
      scroll-snap-align: start;
      width: clamp(280px, 30vw, 380px);
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      cursor: pointer;
    }

    .gallery-item.hidden { display: none; }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      aspect-ratio: 3/4;
      filter: saturate(0.8) contrast(1.05);
      transition: transform 0.8s var(--ease), filter 0.8s var(--ease);
    }

    .gallery-item:hover img { transform: scale(1.06); filter: saturate(1) contrast(1.1); }

    .gallery-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(11,10,9,0.8) 0%, transparent 50%);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-end;
      padding: 20px;
      opacity: 0;
      transition: opacity 0.5s var(--ease);
    }

    .gallery-item:hover .gallery-overlay { opacity: 1; }

    .gallery-overlay-cat {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(237,235,232,0.5);
    }

    .gallery-overlay-title {
      color: #edebe8;
      font-weight: 400;
      font-size: 1rem;
      margin-top: 4px;
    }

    /* ─── LIGHTBOX ─────────────────────────────────────── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(11,10,9,0.95);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: var(--radius-sm);
    }

    .lb-btn {
      position: absolute;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: #edebe8;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.3s;
    }

    .lb-btn:hover { background: rgba(255,255,255,0.12); }

    .lb-close { top: 24px; right: 24px; }
    .lb-prev { top: 50%; left: 24px; transform: translateY(-50%); }
    .lb-next { top: 50%; right: 24px; transform: translateY(-50%); }

    /* ─── TESTIMONIALS ────────────────────────────────── */
    .testi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 1px;
      background: var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-top: clamp(2rem, 4vw, 3.5rem);
    }

    .testi-card {
      background: var(--bg-elevated);
      padding: clamp(1.5rem, 3vw, 2.5rem);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .testi-stars { display: flex; gap: 2px; }
    .testi-stars svg { width: 13px; height: 13px; fill: #f59e0b; }

    .testi-quote {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1.05rem;
      line-height: 1.75;
      color: var(--text);
    }

    .testi-author {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: auto;
    }

    .testi-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      filter: grayscale(0.3);
    }

    .testi-name { font-weight: 500; font-size: 0.88rem; color: var(--text); }
    .testi-role { font-size: 0.75rem; color: var(--text-dim); }

    /* ─── CONTACT ─────────────────────────────────────── */
    .contact-layout {
      display: grid;
      grid-template-columns: 1fr 1.1fr;
      gap: clamp(2rem, 6vw, 5rem);
    }

    .contact-left { display: flex; flex-direction: column; gap: 28px; }

    .contact-items { display: flex; flex-direction: column; gap: 18px; }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 0.95rem;
      color: var(--text-sub);
    }

    .contact-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .contact-icon svg {
      width: 17px;
      height: 17px;
      stroke: var(--text-sub);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .contact-item a {
      color: var(--text-sub);
      text-decoration: none;
      transition: color 0.3s;
    }

    .contact-item a:hover { color: var(--text); }

    .contact-socials { display: flex; gap: 8px; margin-top: 8px; }

    .social-link {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: all 0.3s var(--ease);
    }

    .social-link:hover { border-color: var(--text-dim); background: var(--bg-surface); }

    .social-link svg {
      width: 17px;
      height: 17px;
      fill: var(--text-sub);
      transition: fill 0.3s;
    }

    .social-link:hover svg { fill: var(--text); }

    .contact-form {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: clamp(1.5rem, 3.5vw, 2.5rem);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }

    .field label {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .field input,
    .field textarea,
    .field select {
      padding: 13px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg);
      font-family: var(--font-sans);
      font-size: 0.92rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.3s;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      border-color: var(--text-dim);
    }

    .field textarea { resize: vertical; min-height: 110px; }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .contact-form .btn { align-self: flex-start; margin-top: 4px; }

    /* ─── FOOTER ──────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 28px 0;
    }

    .footer-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer-copy { font-size: 0.78rem; color: var(--text-dim); }

    .footer-links { display: flex; gap: 24px; }

    .footer-links a {
      font-size: 0.78rem;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.3s;
    }

    .footer-links a:hover { color: var(--text-sub); }

    /* ─── GRAIN ───────────────────────────────────────── */
    .grain {
      position: fixed;
      inset: 0;
      z-index: 300;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px;
    }

    /* ─── RESPONSIVE ──────────────────────────────────── */
    @media (max-width: 1024px) {
      .about-grid { grid-template-columns: 1fr; gap: 2.5rem; }
      .about-img-wrap { max-width: 420px; }
      .service-row { grid-template-columns: 1fr; }
      .service-img { min-height: 240px; }
      .service-row:nth-child(even) .service-img { order: 0; }
      .contact-layout { grid-template-columns: 1fr; }
    }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .nav-burger { display: flex; }
      .hero-content h1 { max-width: 100%; }
      .hero-proof { gap: 16px; }
      .proof-sep { display: none; }
      .gallery-item { width: clamp(260px, 70vw, 320px); }
      .field-row { grid-template-columns: 1fr; }
      .testi-grid { grid-template-columns: 1fr; }
      .portfolio-head { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <div class="grain"></div>

  <!-- Nav -->
  <nav id="nav">
    <div class="nav-inner">
      <a href="#" class="nav-logo" id="nav-logo"></a>
      <ul class="nav-links" id="nav-links"></ul>
      <button class="nav-burger" id="burger" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <!-- Mobile -->
  <div class="mobile-overlay" id="mobile-overlay">
    <button class="mobile-close" id="mobile-close" aria-label="Fermer">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div id="mobile-links"></div>
  </div>

  <!-- Hero -->
  <section class="hero" id="accueil">
    <div class="hero-bg">
      <img id="hero-img" src="" alt="" loading="eager" onerror="this.onerror=null;this.src='https://picsum.photos/1600/900?grayscale'">
    </div>
    <div class="hero-content">
      <h1 class="reveal" id="hero-title"></h1>
      <p class="reveal r1" id="hero-sub"></p>
      <div class="hero-buttons reveal r2" id="hero-btns"></div>
      <div class="hero-proof reveal r3" id="hero-proof"></div>
    </div>
  </section>

  <!-- Partners -->
  <section class="partners" id="partners-section">
    <div class="partners-label" id="partners-label"></div>
    <div class="partners-track" id="partners-track"></div>
  </section>

  <!-- About -->
  <section class="section" id="a-propos">
    <div class="container">
      <div class="about-grid">
        <div class="about-img-wrap reveal">
          <img id="about-img" src="" alt="" loading="lazy" onerror="this.onerror=null;this.src='https://picsum.photos/800/1000?grayscale'">
        </div>
        <div class="about-right">
          <span class="label reveal" id="about-label"></span>
          <h2 class="reveal r1" id="about-title"></h2>
          <div id="about-text"></div>
          <div class="about-stats reveal r3" id="about-stats"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- Services -->
  <section class="section" id="services">
    <div class="container">
      <div class="services-head">
        <span class="label reveal">Prestations</span>
        <h2 class="reveal r1" id="srv-title"></h2>
        <p class="reveal r2" id="srv-sub"></p>
      </div>
      <div id="services-rows"></div>
    </div>
  </section>

  <!-- Portfolio -->
  <section class="section" id="portfolio" style="background: var(--bg-surface);">
    <div class="container">
      <div class="portfolio-head">
        <div>
          <span class="label reveal">Galerie</span>
          <h2 class="reveal r1" id="port-title"></h2>
        </div>
        <div class="portfolio-filters reveal r2" id="port-filters"></div>
      </div>
    </div>
    <div class="gallery-scroll container" id="gallery-scroll"></div>
  </section>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lb-btn lb-close" aria-label="Fermer">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <button class="lb-btn lb-prev" aria-label="Précédent">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <img id="lb-img" src="" alt="">
    <button class="lb-btn lb-next" aria-label="Suivant">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <!-- Testimonials -->
  <section class="section" id="temoignages">
    <div class="container">
      <span class="label reveal">Avis clients</span>
      <h2 class="reveal r1" id="testi-title"></h2>
      <div class="testi-grid" id="testi-grid"></div>
    </div>
  </section>

  <!-- Contact -->
  <section class="section" id="contact" style="background: var(--bg-surface);">
    <div class="container">
      <div class="contact-layout">
        <div class="contact-left reveal">
          <div>
            <span class="label">Contact</span>
            <h2 id="ct-title" style="margin-top: 14px;"></h2>
            <p id="ct-sub" style="margin-top: 12px;"></p>
          </div>
          <div class="contact-items" id="ct-items"></div>
          <div class="contact-socials" id="ct-socials"></div>
        </div>
        <form class="contact-form reveal r2" id="ct-form" onsubmit="return sendForm(event)">
          <div class="field-row">
            <div class="field"><label for="fn">Nom</label><input id="fn" placeholder="Votre nom" required></div>
            <div class="field"><label for="fe">Email</label><input type="email" id="fe" placeholder="votre@email.com" required></div>
          </div>
          <div class="field"><label for="fs">Prestation</label><select id="fs"></select></div>
          <div class="field"><label for="fm">Message</label><textarea id="fm" placeholder="Décrivez votre projet..." required></textarea></div>
          <button type="submit" class="btn btn-primary">Envoyer
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </button>
        </form>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <div class="container">
      <div class="footer-inner">
        <span class="footer-copy" id="f-copy"></span>
        <div class="footer-links" id="f-links"></div>
      </div>
    </div>
  </footer>

  <script src="config.js"></script>
  <script>
  (function(){
    const C = CONFIG;

    // ─── Theme ──────────────────────────────────────────
    document.documentElement.style.setProperty('--accent-h', C.accentHue);
    if (C.accentSaturation) document.documentElement.style.setProperty('--accent-s', C.accentSaturation + '%');
    if (C.darkMode) document.documentElement.classList.add('dark');

    // ─── SEO ────────────────────────────────────────────
    document.getElementById('seo-title').textContent = C.seo.title;
    document.getElementById('seo-desc').content = C.seo.description;
    document.getElementById('seo-og').content = C.seo.ogImage;

    // ─── Icons ──────────────────────────────────────────
    const ic = {
      mail: '<svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="22,4 12,13 2,4"/></svg>',
      phone: '<svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>',
      pin: '<svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>',
      instagram: '<svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><circle cx="17.5" cy="6.5" r="1.5"/></svg>',
      facebook: '<svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>',
      linkedin: '<svg viewBox="0 0 24 24"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>',
      behance: '<svg viewBox="0 0 24 24"><path d="M1 12s3-7 8-7 8 7 8 7-3 7-8 7-8-7-8-7z"/><circle cx="9" cy="12" r="3"/></svg>',
      tiktok: '<svg viewBox="0 0 24 24"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/></svg>',
    };

    const starSVG = '<svg viewBox="0 0 24 24" fill="#f59e0b"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';

    const googleG = `<svg class="proof-google-icon" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>`;

    // ─── Nav ────────────────────────────────────────────
    const sections = [
      { l: 'Accueil', h: '#accueil' },
      { l: 'À propos', h: '#a-propos' },
      { l: 'Services', h: '#services' },
      { l: 'Portfolio', h: '#portfolio' },
      { l: 'Avis', h: '#temoignages' },
    ];

    const navLogoEl = document.getElementById('nav-logo');
    navLogoEl.href = '#accueil';
    if (C.logo && (C.logo.endsWith('.png') || C.logo.endsWith('.jpg') || C.logo.endsWith('.svg') || C.logo.endsWith('.webp'))) {
      navLogoEl.innerHTML = `<img src="${C.logo}" alt="${C.name}">`;
    } else {
      navLogoEl.textContent = C.logo || C.name.toUpperCase();
    }

    const nl = document.getElementById('nav-links');
    sections.forEach(s => {
      const li = document.createElement('li');
      li.innerHTML = `<a href="${s.h}">${s.l}</a>`;
      nl.appendChild(li);
    });
    const ctaLi = document.createElement('li');
    ctaLi.innerHTML = `<a href="#contact" class="nav-cta">Contact</a>`;
    nl.appendChild(ctaLi);

    // Mobile
    const ml = document.getElementById('mobile-links');
    [...sections, { l: 'Contact', h: '#contact' }].forEach(s => {
      const a = document.createElement('a');
      a.href = s.h;
      a.textContent = s.l;
      a.onclick = () => document.getElementById('mobile-overlay').classList.remove('open');
      ml.appendChild(a);
    });
    document.getElementById('burger').onclick = () => document.getElementById('mobile-overlay').classList.add('open');
    document.getElementById('mobile-close').onclick = () => document.getElementById('mobile-overlay').classList.remove('open');

    window.addEventListener('scroll', () => {
      document.getElementById('nav').classList.toggle('scrolled', scrollY > 50);
    }, { passive: true });

    // ─── Hero ───────────────────────────────────────────
    const heroImg = document.getElementById('hero-img');
    heroImg.onerror = () => {
      heroImg.onerror = null;
      heroImg.src = 'https://picsum.photos/seed/' + encodeURIComponent(C.name) + '/1600/900';
    };
    heroImg.src = C.hero.image;
    heroImg.alt = '';
    heroImg.onload = () => document.querySelector('.hero').classList.add('loaded');

    document.getElementById('hero-title').innerHTML = C.tagline;
    document.getElementById('hero-sub').textContent = `${C.name} — ${C.subtitle}`;

    const hb = document.getElementById('hero-btns');
    if (C.hero.cta) hb.innerHTML += `<a href="#portfolio" class="btn btn-primary">${C.hero.cta}</a>`;
    if (C.hero.ctaSecondary) hb.innerHTML += `<a href="#contact" class="btn btn-outline">${C.hero.ctaSecondary}</a>`;

    // Hero proof
    const hp = document.getElementById('hero-proof');
    if (C.socialProof) {
      const sp = C.socialProof;
      if (sp.googleRating) {
        const stars = Array(5).fill(0).map(() => `<div class="proof-star">${starSVG}</div>`).join('');
        hp.innerHTML += `
          <a href="${sp.googleUrl || '#'}" target="_blank" rel="noopener" class="proof-google">
            ${googleG}
            <div>
              <div style="display:flex;align-items:center;gap:6px">
                <span class="proof-score">${sp.googleRating}</span>
                <div class="proof-stars">${stars}</div>
              </div>
              <span class="proof-count">${sp.googleReviews} avis Google</span>
            </div>
          </a>`;
      }
      if (sp.clientCount) {
        hp.innerHTML += `<div class="proof-sep"></div>
          <div><span class="proof-stat-value">${sp.clientCount}</span><span class="proof-stat-label">${sp.clientLabel}</span></div>`;
      }
    }

    // ─── Partners ───────────────────────────────────────
    if (C.socialProof?.partners?.length) {
      document.getElementById('partners-label').textContent = C.socialProof.partnersLabel || '';
      const t = document.getElementById('partners-track');
      const buildPartners = () => C.socialProof.partners.map((p, i) =>
        `<div class="partner-name">${p.name}</div>` + (i < C.socialProof.partners.length - 1 ? '<div class="partner-dot"></div>' : '')
      ).join('');
      t.innerHTML = (buildPartners() + '<div class="partner-dot"></div>').repeat(4);
    } else {
      document.getElementById('partners-section').style.display = 'none';
    }

    // ─── About ──────────────────────────────────────────
    document.getElementById('about-label').textContent = C.about.title;
    document.getElementById('about-title').textContent = C.name;
    const aboutImg = document.getElementById('about-img');
    aboutImg.onerror = () => { aboutImg.onerror = null; aboutImg.src = 'https://picsum.photos/seed/portrait-' + encodeURIComponent(C.name) + '/800/1000'; };
    aboutImg.src = C.about.portrait;
    aboutImg.alt = C.name;

    const at = document.getElementById('about-text');
    C.about.text.forEach((t, i) => {
      const p = document.createElement('p');
      p.className = `reveal r${i + 2}`;
      p.textContent = t;
      at.appendChild(p);
    });

    const as = document.getElementById('about-stats');
    C.about.stats.forEach(s => {
      as.innerHTML += `<div><div class="stat-val">${s.value}</div><div class="stat-label">${s.label}</div></div>`;
    });

    // ─── Services (zig-zag) ─────────────────────────────
    document.getElementById('srv-title').textContent = C.services.title;
    document.getElementById('srv-sub').textContent = C.services.subtitle;

    const sr = document.getElementById('services-rows');
    C.services.items.forEach(s => {
      const row = document.createElement('div');
      row.className = 'service-row reveal';
      row.innerHTML = `
        <div class="service-text">
          <span class="label">${s.price}</span>
          <h3>${s.title}</h3>
          <p>${s.description}</p>
        </div>
        <div class="service-img">
          <img src="${s.image || 'https://picsum.photos/seed/' + s.title.replace(/\s/g, '-') + '/700/500'}" alt="${s.title}" loading="lazy" onerror="this.onerror=null;this.src='https://picsum.photos/seed/${s.title.replace(/\s/g,'-')}/700/500?grayscale'">
        </div>`;
      sr.appendChild(row);
    });

    // ─── Portfolio (horizontal scroll) ──────────────────
    document.getElementById('port-title').textContent = C.portfolio.title;

    const pf = document.getElementById('port-filters');
    let activeFilter = 'Tout';

    C.portfolio.categories.forEach(cat => {
      const b = document.createElement('button');
      b.className = 'pf-btn' + (cat === 'Tout' ? ' active' : '');
      b.textContent = cat;
      b.onclick = () => {
        activeFilter = cat;
        pf.querySelectorAll('.pf-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        document.querySelectorAll('.gallery-item').forEach(el => {
          el.classList.toggle('hidden', cat !== 'Tout' && el.dataset.cat !== cat);
        });
      };
      pf.appendChild(b);
    });

    const gs = document.getElementById('gallery-scroll');
    C.portfolio.items.forEach((item, i) => {
      const d = document.createElement('div');
      d.className = 'gallery-item';
      d.dataset.cat = item.category;
      d.innerHTML = `
        <img src="${item.src}" alt="${item.title}" loading="lazy">
        <div class="gallery-overlay">
          <span class="gallery-overlay-cat">${item.category}</span>
          <span class="gallery-overlay-title">${item.title}</span>
        </div>`;
      d.onclick = () => openLB(i);
      gs.appendChild(d);
    });

    // ─── Lightbox ───────────────────────────────────────
    let lbIdx = 0;
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lb-img');

    function visItems() {
      return C.portfolio.items.filter(x => activeFilter === 'Tout' || x.category === activeFilter);
    }

    function openLB(i) {
      const item = C.portfolio.items[i];
      const vis = visItems();
      lbIdx = vis.indexOf(item);
      lbImg.src = item.src;
      lbImg.alt = item.title;
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLB() { lb.classList.remove('open'); document.body.style.overflow = ''; }

    function navLB(d) {
      const v = visItems();
      lbIdx = (lbIdx + d + v.length) % v.length;
      lbImg.src = v[lbIdx].src;
      lbImg.alt = v[lbIdx].title;
    }

    lb.querySelector('.lb-close').onclick = closeLB;
    lb.querySelector('.lb-prev').onclick = e => { e.stopPropagation(); navLB(-1); };
    lb.querySelector('.lb-next').onclick = e => { e.stopPropagation(); navLB(1); };
    lb.onclick = e => { if (e.target === lb) closeLB(); };
    document.onkeydown = e => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') closeLB();
      if (e.key === 'ArrowLeft') navLB(-1);
      if (e.key === 'ArrowRight') navLB(1);
    };

    // ─── Testimonials ───────────────────────────────────
    document.getElementById('testi-title').textContent = C.testimonials.title;

    const tg = document.getElementById('testi-grid');
    C.testimonials.items.forEach((t, i) => {
      const stars5 = Array(5).fill(starSVG).join('');
      tg.innerHTML += `
        <div class="testi-card reveal r${i + 1}">
          <div class="testi-stars">${stars5}</div>
          <div class="testi-quote">"${t.text}"</div>
          <div class="testi-author">
            <img class="testi-avatar" src="${t.avatar}" alt="${t.author}" loading="lazy">
            <div><div class="testi-name">${t.author}</div><div class="testi-role">${t.role}</div></div>
          </div>
        </div>`;
    });

    // ─── Contact ────────────────────────────────────────
    document.getElementById('ct-title').textContent = C.contact.title;
    document.getElementById('ct-sub').textContent = C.contact.subtitle;

    const ci = document.getElementById('ct-items');
    [
      { k: 'mail', t: C.contact.email, h: `mailto:${C.contact.email}` },
      { k: 'phone', t: C.contact.phone, h: `tel:${C.contact.phone.replace(/\s/g, '')}` },
      { k: 'pin', t: C.contact.address, h: null },
    ].forEach(x => {
      if (!x.t) return;
      const inner = x.h ? `<a href="${x.h}">${x.t}</a>` : `<span>${x.t}</span>`;
      ci.innerHTML += `<div class="contact-item"><div class="contact-icon">${ic[x.k]}</div>${inner}</div>`;
    });

    const cs = document.getElementById('ct-socials');
    Object.entries(C.contact.socials).forEach(([k, url]) => {
      if (!url) return;
      cs.innerHTML += `<a href="${url}" target="_blank" rel="noopener" class="social-link">${ic[k] || ''}</a>`;
    });

    const sel = document.getElementById('fs');
    sel.innerHTML = '<option value="">Sélectionnez une prestation</option>' +
      C.services.items.map(s => `<option value="${s.title}">${s.title}</option>`).join('');

    // ─── Footer ─────────────────────────────────────────
    document.getElementById('f-copy').textContent = `${new Date().getFullYear()} ${C.name}. ${C.footer.copyright}.`;
    const fl = document.getElementById('f-links');
    C.footer.legalLinks.forEach(l => { fl.innerHTML += `<a href="${l.href}">${l.label}</a>`; });

    // ─── Form ───────────────────────────────────────────
    window.sendForm = function(e) {
      e.preventDefault();
      const n = document.getElementById('fn').value;
      const em = document.getElementById('fe').value;
      const sv = document.getElementById('fs').value;
      const msg = document.getElementById('fm').value;
      const subj = encodeURIComponent(`Demande de ${sv || 'prestation'} - ${n}`);
      const body = encodeURIComponent(`Nom: ${n}\nEmail: ${em}\nPrestation: ${sv}\n\n${msg}`);
      window.location.href = `mailto:${C.contact.email}?subject=${subj}&body=${body}`;
      return false;
    };

    // ─── Reveal ─────────────────────────────────────────
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
    }, { threshold: 0.08, rootMargin: '0px 0px -30px 0px' });

    document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
  })();
  </script>
</body>
</html>
